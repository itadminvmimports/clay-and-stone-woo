<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Clay & Stone</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #faf8f5; font-family: 'Jost', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-box {
      background: #fff; border: 1px solid rgba(26,26,26,0.1);
      padding: 48px; width: 360px; text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    h1 { font-size: 13px; letter-spacing: 4px; text-transform: uppercase; color: #1a1a1a; margin-bottom: 8px; }
    p  { font-size: 12px; color: #8a7d6e; margin-bottom: 32px; }
    input[type=password] {
      width: 100%; padding: 12px 16px; margin-bottom: 16px;
      border: 1px solid rgba(26,26,26,0.15); background: #faf8f5;
      font-family: 'Jost', sans-serif; font-size: 14px; color: #1a1a1a;
    }
    input[type=password]:focus { outline: none; border-color: #b5693a; }
    button {
      width: 100%; padding: 12px; background: #1a1a1a; color: #fff;
      border: none; font-family: 'Jost', sans-serif;
      font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
      cursor: pointer;
    }
    button:hover { background: #b5693a; }
    .error { color: #b5693a; font-size: 13px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Clay & Stone</h1>
    <p>Admin Access</p>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="POST">
      <input type="password" name="password" placeholder="Password" autofocus>
      <button type="submit">Enter</button>
    </form>
  </div>
</body>
</html>
